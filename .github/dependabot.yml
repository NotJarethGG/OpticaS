version: 2
updates:
  # Dependencias de npm
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
    labels:
      - dependencies

  # Acciones de GitHub
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - github-actions
